name: PR Guard

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: PR checks and guidance
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const problems = [];

            if (!/#\d+/.test(body)) problems.push('Link an Issue (Closes #<n>).');
            if (!/Model\s*\n?-\s*Model used:/i.test(body)) problems.push('Add a "Model used" line (e.g., openai/o3).');
            if (!/Test Plan/i.test(body)) problems.push('Add a Test Plan (unit + integration).');
            if (!/Checklist/i.test(body)) problems.push('Include the Checklist and tick items.');

            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 300,
            });
            const delta = files.data.reduce((a, f) => a + f.additions + f.deletions, 0);
            if (delta > 1500) problems.push('Large PR (>1500 lines). Consider splitting.');

            if (problems.length) {
              const comment = ['PR Guard:', ...problems.map(p => `- ${p}`)].join('\n');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment,
              });
              core.setFailed('PR missing required sections.');
            }
