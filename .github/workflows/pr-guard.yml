name: PR Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr_number = context.payload.pull_request.number;
            const pr = context.payload.pull_request;
            
            const errors = [];
            const warnings = [];
            
            // Check 1: PR must have a linked issue
            const body = pr.body || '';
            const issueRefs = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi);
            
            if (!issueRefs || issueRefs.length === 0) {
              errors.push('❌ **Linked Issue**: PR must reference an issue using "Closes #123" or "Fixes #123"');
            } else {
              // Extract issue number and verify it exists
              const issueMatch = issueRefs[0].match(/#(\d+)/);
              if (issueMatch) {
                const issue_number = parseInt(issueMatch[1]);
                try {
                  await github.rest.issues.get({ owner, repo, issue_number });
                  core.info(`✓ Linked issue #${issue_number} exists`);
                } catch (e) {
                  errors.push(`❌ **Linked Issue**: Issue #${issue_number} does not exist`);
                }
              }
            }
            
            // Check 2: PR template sections should be filled
            const hasModelSection = body.includes('## Model Used') || body.includes('Model:');
            const hasTestPlanSection = body.includes('## Test Plan');
            const hasChecklistSection = body.includes('## Checklist');
            
            if (!hasModelSection) {
              warnings.push('⚠️ **Model Used**: Section not found in PR description (recommended for YOLO PRs)');
            }
            
            if (!hasTestPlanSection) {
              errors.push('❌ **Test Plan**: Section is missing from PR description');
            } else {
              // Check if test plan has content (not just the header)
              const testPlanMatch = body.match(/## Test Plan\s*\n([\s\S]*?)(?=\n##|\n<!--|$)/);
              if (testPlanMatch) {
                const testPlanContent = testPlanMatch[1].trim();
                if (testPlanContent.length < 20) {
                  warnings.push('⚠️ **Test Plan**: Section appears to be empty or very brief');
                }
              }
            }
            
            if (!hasChecklistSection) {
              errors.push('❌ **Checklist**: Section is missing from PR description');
            } else {
              // Check if any checklist items are checked
              const checkedItems = (body.match(/- \[x\]/gi) || []).length;
              if (checkedItems === 0) {
                warnings.push('⚠️ **Checklist**: No items are checked');
              }
            }
            
            // Check 3: PR title should follow conventional commit format or phase format
            const title = pr.title;
            const conventionalCommitPattern = /^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?: .+/;
            const phaseTaskPattern = /^\[Phase \d+\.\d+\]\[Task \d+\]/;
            
            if (!conventionalCommitPattern.test(title) && !phaseTaskPattern.test(title)) {
              warnings.push('⚠️ **PR Title**: Consider using conventional commit format (e.g., "feat: add feature") or phase task format (e.g., "[Phase 2.4][Task 1] Title")');
            }
            
            // Check 4: For phase-labeled PRs, verify yolo label
            const labels = pr.labels.map(l => l.name);
            const hasPhaseLabel = labels.some(l => l.startsWith('phase-'));
            const hasYoloLabel = labels.includes('yolo');
            
            if (hasPhaseLabel && !hasYoloLabel) {
              warnings.push('⚠️ **Labels**: Phase PRs should have the `yolo` label for YOLO Supervisor monitoring');
            }
            
            // Generate report
            const report = [];
            report.push('## PR Guard Validation Report\n');
            
            if (errors.length === 0 && warnings.length === 0) {
              report.push('✅ **All checks passed!**\n');
            } else {
              if (errors.length > 0) {
                report.push('### Errors (must fix)\n');
                errors.forEach(e => report.push(`${e}\n`));
                report.push('\n');
              }
              
              if (warnings.length > 0) {
                report.push('### Warnings (recommended to address)\n');
                warnings.forEach(w => report.push(`${w}\n`));
                report.push('\n');
              }
            }
            
            report.push('---\n');
            report.push('**Guidelines:**\n');
            report.push('- Reference issues with: `Closes #123` or `Fixes #123`\n');
            report.push('- Fill out the PR template completely\n');
            report.push('- Add `yolo` label for YOLO Supervisor tracking\n');
            report.push('- Follow repository conventions (see `.github/copilot-instructions.md`)\n');
            
            // Post comment
            const commentBody = report.join('');
            
            // Find existing PR Guard comment
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr_number
            });
            
            const botComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('PR Guard Validation Report')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr_number,
                body: commentBody
              });
            }
            
            // Fail the check if there are errors
            if (errors.length > 0) {
              core.setFailed(`PR Guard validation failed with ${errors.length} error(s)`);
            } else {
              core.info('PR Guard validation passed');
            }
