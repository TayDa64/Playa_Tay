name: CI (Selective Electron)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  build-example-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and set pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.16.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.77.2'

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          # Electron runtime dependencies
          sudo apt-get install -y libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 || sudo apt-get install -y libasound2

      - name: Install and build @tauri-apps/api (JS)
        run: |
          pnpm -F @tauri-apps/api install
          pnpm -F @tauri-apps/api build

      - name: Install and build Electron sidecar (Pattern A)
        run: |
          pnpm -F @playa/electron-shell install
          pnpm -F @playa/electron-shell build

      - name: Copy sidecar dist into app resources
        run: |
          mkdir -p examples/api/src-tauri/resources/electron-shell
          cp -f packages/electron-shell/dist/main.js examples/api/src-tauri/resources/electron-shell/main.js

      - name: Install and build example frontend (api)
        run: |
          pnpm --filter api install
          pnpm --filter api build

      - name: Cargo check example app
        run: |
          cargo check --manifest-path examples/api/src-tauri/Cargo.toml

      - name: Run integration tests (headless-safe)
        run: |
          cargo test -p api --test electron_integration
        continue-on-error: false

      - name: Build with Rust Tauri CLI (no bundle, CI config)
        run: |
          cargo run -p tauri-cli -- build --no-bundle --ci --config examples/api/src-tauri/tauri.ci.json

      - name: Install Xvfb and screenshot tools (headless smoke test)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-apps imagemagick

      - name: Launch app headlessly and capture screenshot (Xvfb)
        env:
          NO_AT_BRIDGE: '1'
          RUST_LOG: 'tauri=info,tao=info,wry=info'
        run: |
          set -euo pipefail
          BIN=""
          if [ -x target/release/api ]; then
            BIN="target/release/api"
          elif [ -x examples/api/src-tauri/target/release/api ]; then
            BIN="examples/api/src-tauri/target/release/api"
          fi
          if [ -z "$BIN" ]; then
            echo "App binary not found; skipping headless launch."
            exit 0
          fi

          echo "Starting Xvfb on :99 and launching $BIN..."
          Xvfb :99 -screen 0 1280x800x24 &
          XVFB_PID=$!
          export DISPLAY=:99
          mkdir -p artifacts

          # Start app in background, allow it to render, then capture screenshot
          ( timeout 12s "$BIN" || true ) &
          APP_PID=$!
          # Wait up to ~5s for first frame
          for i in $(seq 1 25); do
            sleep 0.2
            # Attempt capture once display is ready
            if xset q >/dev/null 2>&1; then
              break
            fi
          done
          # Capture root window image
          xwd -root -silent | convert xwd:- png:artifacts/headless-screenshot.png || echo "Screenshot capture failed."
          # Cleanup
          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true
          echo "Headless launch + screenshot completed."

      - name: Upload headless screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-screenshot
          path: artifacts/headless-screenshot.png

      # Optional: Uncomment to enable Xvfb-based spawn tests
      # - name: Install Xvfb
      #   run: sudo apt-get install -y xvfb
      # - name: Run spawn tests with Xvfb
      #   run: xvfb-run -a cargo test -p api --test electron_integration::tests::test_open_electron_feature_success

      - name: Prepare zipped artifacts
        if: always()
        run: |
          mkdir -p artifacts
          zip -r artifacts/example-api-dist.zip examples/api/dist
          # Include the entire target tree for debugging (no-bundle build)
          zip -r artifacts/example-api-target.zip examples/api/src-tauri/target

      - name: Upload build artifacts (zipped)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-api-build-zips
          path: artifacts/*.zip

  download-smoke-test:
    name: Optional local download smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build examples (best effort)
        run: |
          set -e
          cargo build --examples || true

      - name: Run local download smoke test (no external network)
        shell: bash
        run: |
          set -euo pipefail
          if [ -x target/debug/examples/basic_download ]; then
            echo "Running local download smoke test against 127.0.0.1"
            TMPDIR=$(mktemp -d)
            echo -n "hello-world" > "$TMPDIR/file.bin"
            PORT=8089
            # Start a simple local HTTP server serving the temp dir
            python3 -m http.server "$PORT" --directory "$TMPDIR" &
            SERVER_PID=$!
            # Wait for server to be ready by probing the index
            for i in {1..20}; do
              if curl -sSf "http://127.0.0.1:$PORT/" > /dev/null; then break; fi
              sleep 0.2
            done
            OUT=$(mktemp)
            target/debug/examples/basic_download "http://127.0.0.1:$PORT/file.bin" "$OUT"
            diff -q "$OUT" "$TMPDIR/file.bin"
            kill $SERVER_PID || true
          else
            echo "Skipping: target/debug/examples/basic_download not found."
          fi
