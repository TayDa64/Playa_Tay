name: YOLO Guidance Comment

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  guide:
    runs-on: ubuntu-latest
    steps:
      - name: Add guidance comment for YOLO issues
        if: >-
          contains(github.event.issue.labels.*.name, 'yolo') ||
          contains(github.event.issue.body, 'Agent MUST read and follow .github/copilot-instructions.md')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              'YOLO mode: quick guidelines',
              '',
              '- Read .github/copilot-instructions.md (Tauri-first, TS no `any`, no `sleep`).',
              '- Keep PRs small: one scope, tests green, docs updated.',
              "- Pick a model from 'Suggested models' (prefer openai/o3 or openai/gpt-4.1; use openai/gpt-5 for complex).",
              '- Add a short test plan in the PR and map to the DoD.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
